
name: dishcovery
description: Dishcovery - simple recipe finder MVP
publish_to: 'none'

environment:
  sdk: '^3.10.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  shared_preferences: ^2.2.0
  flutter_riverpod: ^2.3.6
  cached_network_image: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - lib/data/recipes.json

